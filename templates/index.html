<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>简单记账</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            padding-bottom: 80px;
            color: #333;
        }
        
        /* 顶部统计 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        
        .stat-item {
            flex: 1;
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }
        
        /* 添加按钮（悬浮） */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            z-index: 1000;
            transition: transform 0.3s;
        }
        
        .fab:active {
            transform: scale(0.9);
        }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            animation: fadeIn 0.3s;
        }
        
        .modal.active {
            display: flex;
            align-items: flex-end;
        }
        
        .modal-content {
            background: white;
            width: 100%;
            max-height: 90vh;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-header h2 {
            font-size: 18px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: #f8f9fa;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: none;
        }
        
        /* 快捷输入 */
        .quick-input {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .quick-input h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .submit-btn:active {
            opacity: 0.9;
        }
        
        /* 记录列表 */
        .records-section {
            padding: 15px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .record-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .record-left {
            flex: 1;
        }
        
        .record-category {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .record-desc {
            font-size: 12px;
            color: #999;
        }
        
        .record-right {
            text-align: right;
        }
        
        .record-amount {
            font-size: 18px;
            font-weight: bold;
        }
        
        .record-amount.income {
            color: #4CAF50;
        }
        
        .record-amount.expense {
            color: #f44336;
        }
        
        .record-date {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* 标签页切换 */
        .tab-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <!-- 顶部统计 -->
    <div class="header">
        <h1>💰 简单记账</h1>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">收入</div>
                <div class="stat-value" id="totalIncome">¥0.00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">支出</div>
                <div class="stat-value" id="totalExpense">¥0.00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">结余</div>
                <div class="stat-value" id="balance">¥0.00</div>
            </div>
        </div>
    </div>
    
    <!-- 记录列表 -->
    <div class="records-section">
        <h2 class="section-title">最近记录</h2>
        <div id="recordsList"></div>
    </div>
    
    <!-- 悬浮添加按钮 -->
    <button class="fab" onclick="openModal()">+</button>
    
    <!-- 添加记录弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加记录</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <!-- 标签页切换 -->
            <div class="tab-group">
                <button class="tab-btn active" onclick="switchTab('text')">快捷输入</button>
                <button class="tab-btn" onclick="switchTab('manual')">手动输入</button>
            </div>
            
            <!-- 快捷输入 -->
            <div id="textTab">
                <div class="quick-input">
                    <h3>输入示例</h3>
                    <p style="font-size: 13px; color: #999; line-height: 1.6;">
                        午餐 35<br>
                        打车 28<br>
                        工资 8000<br>
                        7月1日 咖啡 32
                    </p>
                </div>
                <div class="form-group">
                    <textarea id="textInput" placeholder="输入内容，自动识别金额和类别"></textarea>
                </div>
                <button class="submit-btn" onclick="parseText()">添加</button>
            </div>
            
            <!-- 手动输入 -->
            <div id="manualTab" style="display:none;">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="date" value="">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="type">
                        <option value="expense">支出</option>
                        <option value="income">收入</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>类别</label>
                    <select id="category">
                        <option value="餐饮">🍚 餐饮</option>
                        <option value="交通">🚗 交通</option>
                        <option value="购物">🛒 购物</option>
                        <option value="娱乐">🎮 娱乐</option>
                        <option value="生活">🏠 生活</option>
                        <option value="医疗">💊 医疗</option>
                        <option value="工资">💰 工资</option>
                        <option value="其他">📌 其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" id="description" placeholder="可选">
                </div>
                <button class="submit-btn" onclick="addManual()">添加</button>
            </div>
        </div>
    </div>
    
    <script>
        // 设置默认日期
        document.getElementById('date').valueAsDate = new Date();
        
        // 加载数据
        loadData();
        
        function openModal() {
            document.getElementById('addModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'text') {
                tabs[0].classList.add('active');
                document.getElementById('textTab').style.display = 'block';
                document.getElementById('manualTab').style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('textTab').style.display = 'none';
                document.getElementById('manualTab').style.display = 'block';
            }
        }
        
        function loadData() {
            fetch('/api/records')
                .then(res => res.json())
                .then(data => {
                    updateStats(data.summary);
                    updateRecords(data.records);
                });
        }
        
        function updateStats(summary) {
            document.getElementById('totalIncome').textContent = '¥' + summary.income.toFixed(2);
            document.getElementById('totalExpense').textContent = '¥' + summary.expense.toFixed(2);
            
            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = '¥' + summary.balance.toFixed(2);
            if (summary.balance < 0) {
                balanceEl.style.color = '#f44336';
            } else {
                balanceEl.style.color = 'white';
            }
        }
        
        function updateRecords(records) {
            const container = document.getElementById('recordsList');
            
            if (records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无记录</p>
                        <p style="font-size: 13px; margin-top: 8px;">点击右下角 + 添加</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = records.map(record => `
                <div class="record-item">
                    <div class="record-left">
                        <div class="record-category">${record.category}</div>
                        <div class="record-desc">${record.description || ''}</div>
                    </div>
                    <div class="record-right">
                        <div class="record-amount ${record.type}">
                            ${record.type === 'income' ? '+' : '-'}¥${record.amount.toFixed(2)}
                        </div>
                        <div class="record-date">${record.date}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function parseText() {
            const text = document.getElementById('textInput').value;
            if (!text) {
                alert('请输入内容');
                return;
            }
            
            fetch('/api/parse', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    closeModal();
                    document.getElementById('textInput').value = '';
                    loadData();
                } else {
                    alert('解析失败：' + data.error);
                }
            });
        }
        
        function addManual() {
            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) {
                alert('请输入有效金额');
                return;
            }
            
            const record = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                amount: parseFloat(amount),
                description: document.getElementById('description').value
            };
            
            fetch('/api/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(record)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    closeModal();
                    document.getElementById('amount').value = '';
                    document.getElementById('description').value = '';
                    loadData();
                } else {
                    alert('添加失败：' + data.error);
                }
            });
        }
    </script>
</body>
</html>
